<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudFront + S3 Test</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      color: white;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, .2);
      border-radius: 20px;
      padding: 50px;
      text-align: center;
      width: 90%;
      max-width: 650px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, .2);
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
    }

    .success {
      display: inline-block;
      background: #10b981;
      padding: 10px 22px;
      border-radius: 999px;
      font-weight: bold;
      margin-bottom: 30px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      margin-bottom: 15px;
    }

    .info {
      margin-top: 30px;
      padding-top: 25px;
      border-top: 1px solid rgba(255, 255, 255, .2);
    }

    .time {
      font-size: 1.4rem;
      font-weight: bold;
      color: #fde68a;
    }

    footer {
      margin-top: 30px;
      opacity: .8;
      font-size: .9rem;
    }

    @media (max-width:600px) {
      h1 {
        font-size: 2rem;
      }

      .card {
        padding: 35px 25px;
      }
    }
  </style>
</head>

<body>

  <div class="card">

    <div class="success">
      ✅ Deployment Successful
    </div>

    <h1>CloudFront × S3</h1>

    <p>
      このページが表示されているということは、
      <br>
      <strong>CloudFront → S3</strong> の静的コンテンツ配信が成功しています。
    </p>

    <div class="info">
      <p>現在時刻</p>
      <div class="time" id="clock">--:--:--</div>

      <p style="margin-top:25px;">
        URL
      </p>
      <div id="url"></div>
    </div>

    <footer>
      Terraform / AWS CloudFront / Amazon S3
    </footer>

  </div>

  <script>
    function updateClock() {
      const now = new Date();

      document.getElementById("clock").textContent =
        now.toLocaleString("ja-JP");

      document.getElementById("url").textContent =
        window.location.href;
    }

    updateClock();
    setInterval(updateClock, 1000);
  </script>

</body>

</html>
